name: Simple Python Project Check

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: List all files in the repository
      run: |
        echo "Files in repository:"
        find . -type f | sort

    - name: Print Python file info
      run: |
        echo "Python files in the project:"
        find . -name "*.py" | sort
        
        echo "\nContent of producer.py:"
        cat src/producer.py
        
        echo "\nContent of consumer.py:"
        cat src/consumer.py

    - name: Create and show test data directories
      run: |
        mkdir -p data
        mkdir -p src/data
        echo "Created data directories"
        ls -la
        ls -la src/

    - name: Echo success message
      run: |
        echo "GitHub Action workflow completed successfully!"
        echo "Repository: $GITHUB_REPOSITORY"
        echo "Branch: $GITHUB_REF"